# ==============================================================================
# RISE Trader - Version 1 Settings Configuration
# ==============================================================================
# Note: These values control runtime indicator thresholds and strategy weights.

# Market Settings
market:
  index_benchmark: "^NSEI"            # Ticker symbol for NIFTY 50 Reference Index
  timezone: "Asia/Kolkata"            # Market Operating Timezone

# Indicator Parameters
indicators:
  volume_ratio:
    historical_days: 20               # Average volume period baseline
  orb:
    range_minutes: 15                 # Range definition period (first 15-min)
  vwap:
    anchor: "D"                       # Daily VWAP anchor
  relative_strength:
    comparison_period_days: 1         # Lookback comparison span for intraday relative strength

# Strategy Evaluation
strategy:
  min_confidence_score: 75            # Minimum score required to issue a recommendation
  ranking:
    max_recommendations: 2            # Top N stocks to recommend

# Storage Configuration
storage:
  outputs_directory: "data"          # Subdirectory where paper trading logs are saved
  recommendations_filename: "recommendations.csv"
  diagnostics_filename: "diagnostics.log"
